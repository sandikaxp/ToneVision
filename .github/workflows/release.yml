name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.os }} - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: tonevision-windows-amd64
            binary_name: tonevision.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: tonevision-macos-x64
            binary_name: tonevision
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: tonevision-macos-arm64
            binary_name: tonevision
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: tonevision-linux-amd64
            binary_name: tonevision

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\${{ matrix.binary_name }} dist\
          copy RUN_INSTRUCTIONS.md dist\
          copy config.json dist\
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Prepare Package (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/
          cp RUN_INSTRUCTIONS.md dist/
          cp config.json dist/
          cd dist
          zip -r ../${{ matrix.artifact_name }}.zip *

      - name: Prepare Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/
          cp RUN_INSTRUCTIONS.md dist/
          cp config.json dist/
          cd dist
          tar -czf ../${{ matrix.artifact_name }}.tar.gz *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            *.zip
            *.tar.gz

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare files for upload
        run: |
          mkdir release-files
          find artifacts -type f -exec cp {} release-files/ \;
          ls -l release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
